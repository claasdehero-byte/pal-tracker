<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pflege-Kompetenztracker | Berlin LAGeSo</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-content">
            <h1>🩺 Pflegetracker</h1>
            <div class="flex gap-2">
                <div id="theme-toggle" class="tab-btn" style="padding: 0.5rem;">🌓</div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Personal Data Header -->
        <section id="user-info" class="card">
            <h2 style="margin-bottom: 1rem; border-bottom: 2px solid var(--primary-light);">Persönliche Daten</h2>
            <div class="grid-header">
                <div class="input-group">
                    <label>Name des Auszubildenden</label>
                    <input type="text" id="user-name" placeholder="Vorname Nachname">
                </div>
                <div class="input-group">
                    <label>Personentyp</label>
                    <select id="user-type">
                        <option value="apprentice">Auszubildender</option>
                        <option value="student">Studierender</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Ausbildungskurs</label>
                    <input type="text" id="user-kurs" placeholder="z.B. Kurs 42/23">
                </div>
                <div class="input-group">
                    <label>Einsatzzeitraum Von</label>
                    <input type="date" id="user-start">
                </div>
                <div class="input-group">
                    <label>Bis</label>
                    <input type="date" id="user-end">
                </div>
                <div class="input-group">
                    <label>Einsatzbereich</label>
                    <select id="user-bereich">
                        <option value="">Wählen...</option>
                        <option value="Chirurgie">Chirurgie</option>
                        <option value="Innere Medizin">Innere Medizin</option>
                        <option value="Geriatrie">Geriatrie</option>
                        <option value="Pädiatrie">Pädiatrie</option>
                        <option value="Psychiatrie">Psychiatrie</option>
                        <option value="Ambulante Pflege">Ambulante Pflege</option>
                        <option value="Langzeitpflege">Langzeitpflege</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Praxisanleitung (PAL)</label>
                    <input type="text" id="user-pal" placeholder="Name des PAL">
                </div>
            </div>
        </section>

        <!-- Dashboard Overview -->
        <section id="dashboard" class="card">
            <div class="flex justify-between items-center">
                <h2>Gesamtfortschritt</h2>
                <span id="overall-percentage" style="font-weight: 700; color: var(--primary);">0%</span>
            </div>
            <div class="progress-container">
                <div id="overall-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </section>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="tab-btn active" data-target="competencies">Kompetenzkatalog</button>
            <button class="tab-btn" data-target="assignments">Arbeitsaufträge</button>
            <button class="tab-btn" data-target="assessments">Tagesbeurteilung</button>
        </nav>

        <!-- Filter & Search Section -->
        <section id="filters" class="card flex gap-2" style="margin-bottom: 1rem;">
            <select id="filter-area" class="tab-btn" style="flex: 1;">
                <option value="all">Alle Bereiche</option>
                <!-- Categories A-M will be listed here -->
            </select>
            <input type="text" id="search-input" placeholder="Kompetenz suchen..." class="tab-btn"
                style="flex: 2; text-align: left; cursor: text;">
        </section>

        <!-- Competency Catalog Section -->
        <section id="competencies-view" class="view active">
            <div class="card table-container">
                <table id="competency-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Kompetenz</th>
                            <th>Ges.</th>
                            <th>Auf.</th>
                            <th>Selb.</th>
                            <th>Datum</th>
                            <th>Notiz</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="competency-body">
                        <!-- Content will be injected by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Assignments Section -->
        <section id="assignments-view" class="view" style="display: none;">
            <div class="flex justify-between items-center" style="margin-bottom: 1rem;">
                <h2>Eigene Arbeitsaufträge</h2>
                <button id="add-assignment" class="tab-btn active">+ Neuer Auftrag</button>
            </div>
            <div id="assignments-list">
                <!-- Content will be injected by JS -->
            </div>
        </section>

        <!-- Assessments Section -->
        <section id="assessments-view" class="view" style="display: none;">
            <div class="card">
                <h2>Neue Tagesbeurteilung</h2>
                <div class="grid-header" style="margin-top: 1rem;">
                    <div class="input-group">
                        <label>Name des Beurteilenden</label>
                        <input type="text" id="eval-name" placeholder="Name">
                    </div>
                    <div class="input-group">
                        <label>Datum</label>
                        <input type="date" id="eval-date">
                    </div>
                    <div class="input-group">
                        <label>Schicht</label>
                        <select id="eval-shift">
                            <option value="Frühdienst">Frühdienst</option>
                            <option value="Spätdienst">Spätdienst</option>
                            <option value="Nachtdienst">Nachtdienst</option>
                        </select>
                    </div>
                </div>
                <div class="input-group" style="margin-top: 1rem;">
                    <label>Beurteilung / Feedback</label>
                    <textarea id="eval-text" class="tab-btn"
                        style="width: 100%; min-height: 100px; text-align: left; cursor: text; font-family: inherit; font-size: 1rem;"
                        placeholder="Kurze Beurteilung des Tages..."></textarea>
                </div>
                <button id="save-assessment" class="tab-btn active" style="margin-top: 1rem; width: 100%;">Beurteilung
                    speichern</button>
            </div>

            <div id="assessments-list" style="margin-top: 2rem;">
                <!-- Content will be injected by JS -->
            </div>
        </section>

        <!-- Export Buttons Section -->
        <section class="flex gap-2" style="margin-top: 2rem; margin-bottom: 4rem;">
            <button id="export-pdf" class="tab-btn active" style="background: var(--red); border-color: var(--red);">📄
                PDF Export</button>
            <button id="export-csv" class="tab-btn"
                style="background: var(--secondary); border-color: var(--secondary); color: white;">📊 CSV
                Export</button>
            <button id="reset-all" class="tab-btn" style="margin-left: auto;">🧨 Alle Daten löschen</button>
        </section>
    </main>

    <!-- PDF library integration -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
